<style>
.pdf-download-in-toc {
  text-align: center;
  margin-top: 1rem;
}

.pdf-download-in-toc a {
  display: inline-flex;
  align-items: center;
  gap: 0.4em;
  padding: 0.4em 0.8em;
  background-color: #f5f5f5;
  border-radius: 8px;
  text-decoration: none;
  font-size: 0.9em;
  color: #333;
  transition: background-color 0.2s ease;
}

.pdf-download-in-toc a:hover {
  background-color: #e0e0e0;
}

.pdf-download-in-toc svg {
  width: 18px;
  height: 18px;
  fill: currentColor;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
  // essaie plusieurs sélecteurs possibles pour trouver le TOC
  const toc =
    document.querySelector(".quarto-toc-container") ||
    document.querySelector(".toc") ||
    document.querySelector("nav#TOC") ||
    document.querySelector(".sidebar nav");

  if (toc) {
    // Ajouter le logo avant le TOC
    const logo = document.createElement("img");
    logo.src = "img/Logo_simple_ISTOM_Couleurs_HD.png";
    logo.style.cssText = "float:left;height:60px; margin-bottom: 1rem;";
    toc.parentNode.insertBefore(logo, toc);
    
    // S'assurer que le TOC est sous le logo
    toc.style.clear = "both";

    // Ajouter le bouton PDF
    const div = document.createElement("div");
    div.className = "pdf-download-in-toc";
    div.style.textAlign = "left"; // Force l'alignement à gauche
    div.innerHTML = `
      <a href="doc/Presentations_Renaud.pdf" target="_blank">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M12 16l4-5h-3V4h-2v7H8l4 5zm8 2H4v2h16v-2z"/>
        </svg>
        Présentations Renaud</a>
    `;
    toc.appendChild(div);
    
    // 3. Ajouter le DEUXIÈME bouton (Planning / Projet)
    const div2 = document.createElement("div");
    div2.className = "pdf-download-in-toc";
    div2.style.textAlign = "left"; // Force l'alignement à gauche
    div2.innerHTML = `
      <a href="doc/Articles.pdf" target="_blank">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="width:18px; vertical-align:middle;">
          <path d="M12 16l4-5h-3V4h-2v7H8l4 5zm8 2H4v2h16v-2z"/>
        </svg>
        Articles</a>
    `;
    toc.appendChild(div2);
    
     // 3. Ajouter le DEUXIÈME bouton (Planning / Projet)
    const div3 = document.createElement("div");
    div3.className = "pdf-download-in-toc";
    div3.style.textAlign = "left"; // Force l'alignement à gauche
    div3.innerHTML = `
      <a href="doc/Itineraire_technique_du_cotonnier_et_mecanisation_agricole.pdf" target="_blank">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="width:18px; vertical-align:middle;">
          <path d="M12 16l4-5h-3V4h-2v7H8l4 5zm8 2H4v2h16v-2z"/>
        </svg>
        Itinéraire technique</a>
    `;
    toc.appendChild(div3);
    
  } else {
    console.warn("TOC non trouvé — vérifie le thème ou la structure HTML");
  }
});
</script>
